<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-type" content="text/html; charset=utf-8">
</head>
<body>
    <center>
        <canvas id="canvas" width="800" height="800" oncontextmenu="event.preventDefault()"></canvas>

        <script type="text/javascript">
            var Module = {
                canvas: document.getElementById('canvas'),

                onRuntimeInitialized: function () {
                    Module.canvas.width = 800;
                    Module.canvas.height = 800;

                    // Correct pointer lock: use the DOM API, not the Emscripten runtime
                    Module.canvas.onclick = function () {
                        Module.canvas.requestPointerLock();
                    };
                }
            };
        </script>

        <script src="index.js"></script>
        <!-- debug -->
        <script>
            document.addEventListener("pointerlockchange", () =>
                {console.log("Pointer lock element:", document.pointerLockElement)});
        </script>

    </center>
</body>
</html>
